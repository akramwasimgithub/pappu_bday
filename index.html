<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandrapal birthday Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap');

        body {
            font-family: 'Jost', sans-serif;
            background:linear-gradient(rgba(162, 151, 151, 0.8), rgba(0,0,0,0.9)),url('./image1.jpg'); /* The iconic "Doge" but dark */
            background-size: default;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 85%;
            border: 4px solid #ff4500;
        }

        /* Meme text styling */
        h1 { font-size: 2.5rem; color: black; -webkit-text-stroke: 1.5px white; margin-bottom: 0.5rem; }
        .quote { font-style: italic; color: #555; margin: 0; font-size: 1.1rem; }
        
        p.invite-text { color: black; font-weight: bold; margin-bottom: 2rem; font-size: 1.2rem;}

        .details {
            background: #fdf2e9;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px dashed #ff4500;
            line-height: 1.8;
            font-size: 1.1rem;
        }
        
        .venue-name {color: #d35400; font-weight: bold;}

        /* Button Group */
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        /* ACCEPT BUTTON */
        .accept-btn { 
            background-color: #2ecc71; 
            color: white; 
            box-shadow: 0 5px #27ae60;
        }
        .accept-btn:hover { background-color: #27ae60; }
        
        /* DECLINE BUTTON (The running one) */
        .decline-btn { 
            background-color: #e74c3c; 
            color: white; 
            box-shadow: 0 5px #c0392b;
            position: relative; /* Crucial for moving it */
            
        }
        /* ADD THIS CSS TO FIX THE BUTTON POSITIONING CONFLICT */
        .decline-btn.runaway-effect {
            position: relative; /* REQUIRED for movement */
            left: 0;
            top: 0;
            z-index: 100;
            margin: 10px auto; /* Centered initial position */
        }
                .decline-btn:hover { background-color: #c0392b; }

        button:active { transform: translateY(3px); box-shadow: 0 2px #27ae60; }

        #final-msg { margin-top: 25px; font-weight: bold; font-size: 1.3rem; height: 30px; }

        /* Bollywood-esque entry animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body>

            <div class="card">
            <div class="header-section">
                <h1>Radhe Radhe !</h1>
                <p class="italic-quote">"tujhe meri birthday ki yaad nahi aayi jassi "</p>
            </div>

            <hr class="divider">

            <div class="content-section">
                <h2>"Link click krke aya matlb tujhe party me ana hai".</h2>
            </div>

            <div class="info-box-wrapper">
                <div class="info-box">
                    <p class="location-item">📍 LOCATION: <span class="highlight">Near avesto</span></p>
                    <p class="time-item">⏰ TIME: <span class="highlight">4 PM</span></p>
                    <p class="date-item">📅 DATE: <span class="highlight">24 April !</span></p>
                </div>
            </div>

            <div class="final-action-section">
                <p class="quote blink-text">"Invitation Accept karne ke liye click kro."</p>
                <div class="action-buttons-wrapper">
                    <button class="accept-btn" onclick="response('YES')">I AM COMMING! 🥳</button>
                    
                    <button class="decline-btn" id="runawayBtn" 
                        onmouseover="tryRun()"onclick="tryRun()">
                        NAHI AA PAUNGA BHAI... 😢
                    </button>
                 </div>
            </div>
        </div>
        
        <p id="final-msg"></p>

        <div id="popup-overlay">
            <img id="popup-img" src="" alt="Meme Response">
            <h2 id="popup-text"></h2> <p style="color: white;">Redirecting to WhatsApp...</p>
        </div>

        <style>
            #popup-overlay {
                display: none; /* Hidden by default */
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                z-index: 9999;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }

                    #popup-overlay img {
                        max-width: 90%;
                        max-height: 70%;
                        border: 5px solid white;
                        border-radius: 15px;
                        box-shadow: 0 0 20px rgba(255,255,255,0.5);
                    }

                    #popup-overlay h2 {
                        color: white;
                        margin-top: 20px;
                        font-size: 2rem;
                        -webkit-text-stroke: 1px #ff4500;
                    }
                    /* The Blinking Animation */
                    @keyframes blinker {
                        50% { opacity: 0.2; transform: scale(1.05); }
                    }

                    .blink-text {
                        color: #ff4500; /* A bright orange/red for attention */
                        font-weight: bold;
                        animation: blinker 1s linear infinite; /* Blinks every 1 second */
                        display: inline-block; /* Required for the scale effect to work */
                        cursor: pointer;
                    }
        </style>

    <script>
        
        // Function for the Running Button Prank
        let declineAttempts = 0;

            function tryRun() {
                const btn = document.getElementById("runawayBtn");
                const popup = document.getElementById('popup-overlay');
                const popupImg = document.getElementById('popup-img');
                const popupText = document.getElementById('popup-text');
                
                declineAttempts++;

                // 1st and 2nd attempt: The button jumps away
            if (declineAttempts <= 2) {
                    // Generates a random jump between -100px and 100px
                    const x = Math.random() * 200 - 100; 
                    const y = Math.random() * 200 - 100; 
                    
                    btn.style.transform = `translate(${x}px, ${y}px)`;
                } 
                // 3rd attempt: Trigger the "Gussa" popup
             else {
                    btn.style.transform = "translate(0, 0)";
                    // Make sure 'gussa.jpg' is in your folder!
                    popupImg.src = './531suo.jpg'; 
                    popupText.innerText = "KYU BHAI ITNA GUSSA, AJA PARTY ME! ❤️";
                    popup.style.display = 'flex';

                     setTimeout(() => {
                    const gussaMsg = encodeURIComponent("Bhai, itna gussa kyun?, main aa raha hoon! Thanks for Inviting 😂🙌,Happy Bday");
                    window.location.href = `https://wa.me/917870961288?text=${gussaMsg}`;
                }, 3000);
            }
         }
        
            function response(answer) {
                if(answer === 'YES') {
                    const popup = document.getElementById('popup-overlay');
                    const popupImg = document.getElementById('popup-img');
                    const popupText = document.getElementById('popup-text');

                    // 1. List your images here
                    const memeImages = [
                        './images.jpeg', // First image
                        './image2.jpg' , // Second image
                        './image3.jpg',
                        './image4.jpeg'
                    ];

                    // 2. Optional: Change the text based on the image too!
                    const memeTexts = [
                        'Bhai Party attend krne ke liye Uzbekistan ana padega!',
                        'WAH BETA MAUJ, INDIA SE HI PARTY LENA HAI UZBEKISTAN AAO!',
                        'Love u darling COME TO UZBEKISTAN ',
                        'Aao UZBEKISATA pe'
                    ];

                    // 3. Pick a random index (0 or 1)
                    const randomIndex = Math.floor(Math.random() * memeImages.length);

                    // 4. Apply the random choice
                    popupImg.src = memeImages[randomIndex];
                    popupText.innerText = memeTexts[randomIndex];

                    // 5. Show the popup
                    popup.style.display = 'flex';

                // 6. Play a sound (Optional: you can add a meme sound here)
                
                
                setTimeout(() => {
                const ticketMsg = encodeURIComponent("Bhai ticket bhejde tab na aunga! Thanks for Inviting 🥳 Happy Bday");
                window.location.href = `https://wa.me/917870961288?text=${ticketMsg}`;
            },  2500); // 2.5 seconds delay to read the meme
            }
        }
    </script>

</body>
</html>
