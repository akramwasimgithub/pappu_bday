<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgent! Top Secret Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap');

        body {
            font-family: 'Jost', sans-serif;
            background:linear-gradient(rgba(162, 151, 151, 0.8), rgba(0,0,0,0.9)),url('./image1.jpg'); /* The iconic "Doge" but dark */
            background-size: default;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 85%;
            border: 4px solid #ff4500;
        }

        /* Meme text styling */
        h1 { font-size: 2.5rem; color: black; -webkit-text-stroke: 1.5px white; margin-bottom: 0.5rem; }
        .quote { font-style: italic; color: #555; margin: 0; font-size: 1.1rem; }
        
        p.invite-text { color: black; font-weight: bold; margin-bottom: 2rem; font-size: 1.2rem;}

        .details {
            background: #fdf2e9;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            border: 2px dashed #ff4500;
            line-height: 1.8;
            font-size: 1.1rem;
        }
        
        .venue-name {color: #d35400; font-weight: bold;}

        /* Button Group */
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        /* ACCEPT BUTTON */
        .accept-btn { 
            background-color: #2ecc71; 
            color: white; 
            box-shadow: 0 5px #27ae60;
        }
        .accept-btn:hover { background-color: #27ae60; }
        
        /* DECLINE BUTTON (The running one) */
        .decline-btn { 
            background-color: #e74c3c; 
            color: white; 
            box-shadow: 0 5px #c0392b;
            position: relative; /* Crucial for moving it */
        }
        .decline-btn:hover { background-color: #c0392b; }

        button:active { transform: translateY(3px); box-shadow: 0 2px #27ae60; }

        #final-msg { margin-top: 25px; font-weight: bold; font-size: 1.3rem; height: 30px; }

        /* Bollywood-esque entry animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Habibi !</h1>
        <p class="quote">"ajaa tujhe fanta pilata hun" </p>
        <hr style="border-color: #ddd;">
        <p class="invite-text">"tujhe meri birthday ki yaad nahi aayi jassi".</p>
        
        <div class="details">
            📍 LOCATION: <span class="venue-name">Near avesto</span><br>
            ⏰ TIME: <span class="venue-name">4 PM</span><br>
            📅 DATE: <span class="venue-name">24 April !</span>
        </div>

        <p class="quote">Decision time. Don't be "that guy."</p><br>

        <div class="btn-group">
            <button class="accept-btn" onclick="response('YES')">100% Coming! 🥳</button>
            <button class="decline-btn" id="runawayBtn" onmouseover="tryRun()">Can't make it... 😢</button>
        </div>

        <div id="popup-overlay">
            <img id="popup-img" src="" alt="Meme Response">
            <h2 id="popup-text"></h2> <p style="color: white;">Redirecting to WhatsApp...</p>
        </div>

        <style>
            #popup-overlay {
                display: none; /* Hidden by default */
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                z-index: 9999;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }

                    #popup-overlay img {
                        max-width: 90%;
                        max-height: 70%;
                        border: 5px solid white;
                        border-radius: 15px;
                        box-shadow: 0 0 20px rgba(255,255,255,0.5);
                    }

                    #popup-overlay h2 {
                        color: white;
                        margin-top: 20px;
                        font-size: 2rem;
                        -webkit-text-stroke: 1px #ff4500;
                    }
        </style>

    <script>
        const btn = document.getElementById("runawayBtn");

        let attempts = 0;

                // 6. Play a sound (Optional: you can add a meme sound here)
                
                // 7. Redirect after 3 seconds so they can see the image
                const yourNumber = "998946732561"; // Your WhatsApp

                    window.location.href = "https://wa.me/+998946732561?text=I'm%20coming%20to%20the%20birthday%20party!%20🥳";

        }
    </script>

</body>
</html>
